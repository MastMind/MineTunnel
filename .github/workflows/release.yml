name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - arch: amd64
            deb_arch: amd64
            cc: gcc
            cflags: ""
            ldflags: ""

          - arch: i686
            deb_arch: i386
            cc: gcc
            cflags: "-m32"
            ldflags: "-m32"
            extra_packages: gcc-multilib

          - arch: arm64
            deb_arch: arm64
            cc: aarch64-linux-gnu-gcc
            extra_packages: gcc-aarch64-linux-gnu

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc ${{ matrix.extra_packages }}

      - name: Build binary
        run: |
          if [ -n "${{ matrix.cflags }}" ]; then
            make CC=${{ matrix.cc }} \
                 CFLAGS="-s -c -Wall -Werror -static -O1 ${{ matrix.cflags }}" \
                 LDFLAGS="-s -static ${{ matrix.ldflags }}"
          else
            make CC=${{ matrix.cc }}
          fi

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build .deb package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          DEB_ARCH=${{ matrix.deb_arch }}
          PKG=minetunnel_${VERSION}_${DEB_ARCH}

          mkdir -p ${PKG}/DEBIAN
          mkdir -p ${PKG}/usr/bin

          cp minetunnel ${PKG}/usr/bin/minetunnel
          chmod 755 ${PKG}/usr/bin/minetunnel

          cat > ${PKG}/DEBIAN/control << EOF
          Package: minetunnel
          Version: ${VERSION}
          Architecture: ${DEB_ARCH}
          Maintainer: MastMind
          Description: Simple application for creating VPN tunnels
           Supports tun/tap interfaces over UDP and ICMP protocols.
          Depends: libc6
          EOF

          dpkg-deb --build ${PKG}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: minetunnel_${{ steps.version.outputs.VERSION }}_${{ matrix.deb_arch }}
          path: minetunnel_${{ steps.version.outputs.VERSION }}_${{ matrix.deb_arch }}.deb

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MineTunnel v${{ steps.version.outputs.VERSION }}"
          body: |
            ## MineTunnel v${{ steps.version.outputs.VERSION }}

            ### Installation

            Download the package for your architecture:

            | Architecture | File |
            |---|---|
            | x86_64 (64-bit) | `minetunnel_${{ steps.version.outputs.VERSION }}_amd64.deb` |
            | x86 (32-bit)    | `minetunnel_${{ steps.version.outputs.VERSION }}_i386.deb`  |
            | ARM64           | `minetunnel_${{ steps.version.outputs.VERSION }}_arm64.deb` |
```bash
            sudo dpkg -i minetunnel_${{ steps.version.outputs.VERSION }}_<arch>.deb
            sudo minetunnel --config config.json
```
          files: dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
