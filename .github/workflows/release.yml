name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build'
        required: false

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - arch: amd64
            deb_arch: amd64
            cc: gcc
            cflags: ""
            ldflags: ""

          - arch: i686
            deb_arch: i386
            cc: gcc
            cflags: "-m32"
            ldflags: "-m32"
            extra_packages: gcc-multilib

          - arch: arm64
            deb_arch: arm64
            cc: aarch64-linux-musl-gcc

          - arch: armv7
            deb_arch: armhf
            cc: arm-linux-musleabihf-gcc

          - arch: armv6
            deb_arch: armel
            cc: arm-linux-musleabi-gcc
            cflags: "-march=armv6 -mfpu=vfp -mfloat-abi=softfp"

          - arch: mips
            deb_arch: mips
            cc: mips-linux-musl-gcc

          - arch: mipsel
            deb_arch: mipsel
            cc: mipsel-linux-musl-gcc

          - arch: mips64
            deb_arch: mips64el
            cc: mips64el-linux-musl-gcc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install base packages
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc ${{ matrix.extra_packages }}

      - name: Install musl cross toolchains
        run: |
          set -e

          TOOLCHAINS=(
            arm-linux-musleabihf
            arm-linux-musleabi
            aarch64-linux-musl
            mips-linux-musl
            mipsel-linux-musl
            mips64el-linux-musl
          )

          for t in "${TOOLCHAINS[@]}"; do
            echo "Downloading $t..."
            wget -4 -q https://musl.cc/${t}-cross.tgz
            tar -xzf ${t}-cross.tgz
            echo "$PWD/${t}-cross/bin" >> $GITHUB_PATH
          done

      - name: Build binary
        run: |
          echo "Using CC=${{ matrix.cc }}"

          if [ -n "${{ matrix.cflags }}" ]; then
            make CC=${{ matrix.cc }} \
                 CFLAGS="-s -c -Wall -Werror -static -O1 -Wno-unused-result ${{ matrix.cflags }}" \
                 LDFLAGS="-s -static ${{ matrix.ldflags }}"
          else
            make CC=${{ matrix.cc }} \
                 CFLAGS="-s -c -Wall -Werror -static -O1 -Wno-unused-result" \
                 LDFLAGS="-s -static"
          fi

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build .deb package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          DEB_ARCH=${{ matrix.deb_arch }}
          PKG=minetunnel_${VERSION}_${DEB_ARCH}

          mkdir -p ${PKG}/DEBIAN
          mkdir -p ${PKG}/usr/bin

          cp minetunnel ${PKG}/usr/bin/minetunnel
          chmod 755 ${PKG}/usr/bin/minetunnel

          cat > ${PKG}/DEBIAN/control << EOF
          Package: minetunnel
          Version: ${VERSION}
          Architecture: ${DEB_ARCH}
          Maintainer: MastMind
          Description: Simple application for creating VPN tunnels
           Supports tun/tap interfaces over UDP and ICMP protocols.
          Depends:
          EOF

          dpkg-deb --build ${PKG}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: minetunnel_${{ steps.version.outputs.VERSION }}_${{ matrix.deb_arch }}
          path: minetunnel_${{ steps.version.outputs.VERSION }}_${{ matrix.deb_arch }}.deb

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MineTunnel v${{ steps.version.outputs.VERSION }}"
          body: |
            ## MineTunnel v${{ steps.version.outputs.VERSION }}

            Fully static builds (musl-based, portable across distros)

          files: dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
